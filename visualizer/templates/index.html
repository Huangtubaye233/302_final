<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        <div id="controls">
            <div class="control-group">
                <div class="value-display">FPS: <span id="actualFps">--</span></div>
                <div class="value-display">Step: <span id="stepDisplay">0</span></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let panelOrder = ['00', '01', '10', '11'];
        const panelState = {};
        let currentStep = 0;

        const actualFpsDisplay = document.getElementById('actualFps');
        const stepDisplay = document.getElementById('stepDisplay');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const colormaps = {
            magma: [
                [0.001462, 0.000466, 0.013866],
                [0.063536, 0.028426, 0.118956],
                [0.188923, 0.071159, 0.232229],
                [0.316654, 0.071689, 0.314706],
                [0.444667, 0.074981, 0.383823],
                [0.566949, 0.094290, 0.440529],
                [0.680280, 0.131803, 0.484307],
                [0.780105, 0.188923, 0.515993],
                [0.864406, 0.265113, 0.536616],
                [0.933010, 0.359688, 0.548053],
                [0.987053, 0.991438, 0.749504]
            ]
        };

        function getColorFromScale(value) {
            value = Math.max(0, Math.min(1, value));
            const cmap = colormaps.magma;
            const n = cmap.length - 1;
            const idx = value * n;
            const i0 = Math.floor(idx);
            const i1 = Math.min(n, Math.ceil(idx));
            const t = idx - i0;
            const c0 = cmap[i0];
            const c1 = cmap[i1];
            const r = Math.floor((c0[0] + t * (c1[0] - c0[0])) * 255);
            const g = Math.floor((c0[1] + t * (c1[1] - c0[1])) * 255);
            const b = Math.floor((c0[2] + t * (c1[2] - c0[2])) * 255);
            return `rgb(${r},${g},${b})`;
        }

        function worldToPanelScreen(panelRect, cameraX, x, y) {
            const scale = panelRect.h * 0.68;
            const cx = panelRect.x + panelRect.w * 0.5;
            const cy = panelRect.y + panelRect.h * 0.82;
            return {
                x: cx + (x - cameraX) * scale,
                y: cy - y * scale
            };
        }

        function drawPanel(panelRect, panel) {
            ctx.fillStyle = '#d6e2ea';
            ctx.fillRect(panelRect.x, panelRect.y, panelRect.w, panelRect.h);

            ctx.strokeStyle = '#9fb3c1';
            ctx.lineWidth = 2;
            ctx.strokeRect(panelRect.x + 1, panelRect.y + 1, panelRect.w - 2, panelRect.h - 2);

            // Clip all world rendering into the current panel bounds.
            ctx.save();
            ctx.beginPath();
            ctx.rect(panelRect.x + 2, panelRect.y + 2, panelRect.w - 4, panelRect.h - 4);
            ctx.clip();

            if (!panel) {
                ctx.fillStyle = '#2b3a42';
                ctx.font = '600 18px Arial';
                ctx.fillText('Waiting for panel data...', panelRect.x + 16, panelRect.y + 36);
                ctx.restore();
                return;
            }

            const cameraX = (panel.center_of_mass && panel.center_of_mass[0]) ? panel.center_of_mass[0] : 0.0;

            if (panel.terrain_profile && panel.terrain_profile.length > 1) {
                ctx.strokeStyle = '#4a6b80';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                panel.terrain_profile.forEach((pt, idx) => {
                    const s = worldToPanelScreen(panelRect, cameraX, pt[0], pt[1]);
                    if (idx === 0) {
                        ctx.moveTo(s.x, s.y);
                    } else {
                        ctx.lineTo(s.x, s.y);
                    }
                });
                ctx.stroke();
            }

            if (panel.positions && panel.springs) {
                ctx.lineWidth = 2.2;
                for (let i = 0; i < panel.springs.length; i++) {
                    const spring = panel.springs[i];
                    const p1 = panel.positions[spring[0]];
                    const p2 = panel.positions[spring[1]];
                    if (!p1 || !p2) continue;
                    const s1 = worldToPanelScreen(panelRect, cameraX, p1[0], p1[1]);
                    const s2 = worldToPanelScreen(panelRect, cameraX, p2[0], p2[1]);
                    const act = panel.activations && panel.activations[i] !== undefined ? panel.activations[i] : 0.0;
                    const normAct = 0.5 + 0.5 * Math.tanh(act);
                    ctx.strokeStyle = getColorFromScale(normAct);
                    ctx.beginPath();
                    ctx.moveTo(s1.x, s1.y);
                    ctx.lineTo(s2.x, s2.y);
                    ctx.stroke();
                }
                ctx.fillStyle = '#FFD166';
                for (const pos of panel.positions) {
                    if (!pos) continue;
                    const s = worldToPanelScreen(panelRect, cameraX, pos[0], pos[1]);
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 3.8, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }

            ctx.restore();

            const textX = panelRect.x + panelRect.w - 10;
            ctx.textAlign = 'right';
            ctx.fillStyle = '#102a43';
            ctx.font = '700 16px Arial';
            ctx.fillText((panel.title || panel.id).replace(/Spread/g, 'Sparse'), textX, panelRect.y + 24);

            ctx.font = '600 13px Arial';
            const coverageText = `coverage: ${(panel.coverage || 0).toFixed(3)}`;
            const morphText = `morph: ${panel.morphology_reward === 'spread' ? 'sparse' : 'normal'}`;
            const styleText = `style: ${panel.movement_style || 'neutral'}`;
            ctx.fillText(coverageText, textX, panelRect.y + 44);
            ctx.fillText(morphText, textX, panelRect.y + 62);
            ctx.fillText(styleText, textX, panelRect.y + 80);
            ctx.textAlign = 'left';
        }

        function draw() {
            ctx.fillStyle = '#0f1720';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const margin = 10;
            const panelW = (canvas.width - margin * 3) / 2;
            const panelH = (canvas.height - margin * 3) / 2;
            const rects = [
                { x: margin, y: margin, w: panelW, h: panelH },
                { x: margin * 2 + panelW, y: margin, w: panelW, h: panelH },
                { x: margin, y: margin * 2 + panelH, w: panelW, h: panelH },
                { x: margin * 2 + panelW, y: margin * 2 + panelH, w: panelW, h: panelH }
            ];

            for (let i = 0; i < 4; i++) {
                const panelId = panelOrder[i];
                drawPanel(rects[i], panelState[panelId]);
            }
        }

        function startStream() {
            const es = new EventSource('/stream');

            es.onmessage = (event) => {
                if (!event.data) return;
                const msg = JSON.parse(event.data);

                if (msg.type === 'topology_batch') {
                    if (msg.panels && msg.panels.length === 4) {
                        const orderedPanels = [...msg.panels].sort((a, b) => String(a.id).localeCompare(String(b.id)));
                        panelOrder = orderedPanels.map(p => p.id);
                    }
                    for (const panel of msg.panels || []) {
                        panelState[panel.id] = {
                            ...(panelState[panel.id] || {}),
                            ...panel,
                            positions: [],
                            activations: [],
                            center_of_mass: [0, 0],
                            coverage: 0.0,
                        };
                    }
                    draw();
                } else if (msg.type === 'step_batch') {
                    for (const panel of msg.panels || []) {
                        panelState[panel.id] = {
                            ...(panelState[panel.id] || {}),
                            ...panel,
                            springs: (panelState[panel.id] || {}).springs || [],
                            terrain_profile: (panelState[panel.id] || {}).terrain_profile || []
                        };
                        currentStep = Math.max(currentStep, panel.step || 0);
                    }
                    stepDisplay.textContent = currentStep;
                    if (msg.fps !== undefined) {
                        actualFpsDisplay.textContent = msg.fps.toFixed(0);
                    }
                    draw();
                }
            };

            es.onerror = (error) => {
                console.error('EventSource error:', error);
            };
        }

        window.addEventListener('load', () => {
            startStream();
            draw();
        });
    </script>
</body>
</html>
